name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  scaffold-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/create-auralith-app/package-lock.json

      - name: Install CLI dependencies
        run: npm ci
        working-directory: packages/create-auralith-app

      - name: Build CLI
        run: npm run build
        working-directory: packages/create-auralith-app

      - name: Scaffold smoke apps
        run: |
          rm -rf /tmp/auralith-ci-smoke
          mkdir -p /tmp/auralith-ci-smoke
          cd /tmp/auralith-ci-smoke

          node "$GITHUB_WORKSPACE/packages/create-auralith-app/dist/index.js" smoke-ci-landing --template landing --skip-prompts --no-install --no-git
          node "$GITHUB_WORKSPACE/packages/create-auralith-app/dist/index.js" smoke-ci-dashboard --template dashboard --skip-prompts --no-install --no-git

      - name: Install and build landing
        run: npm install && npm run build
        working-directory: /tmp/auralith-ci-smoke/smoke-ci-landing

      - name: Install and build dashboard
        run: npm install && npm run build
        working-directory: /tmp/auralith-ci-smoke/smoke-ci-dashboard
